name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: lexverdict_test
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d lexverdict_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pgsql, pdo_pgsql
          coverage: none

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PHP dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Install frontend dependencies
        run: npm ci

      - name: Prepare environment
        run: |
          cp .env.testing.example .env.testing
          php artisan key:generate --env=testing

      - name: PHP format check
        run: composer format -- --test

      - name: Static analysis
        run: composer analyse -- --no-progress

      - name: Frontend lint
        run: npm run lint

      - name: TypeScript check
        run: npm run typecheck

      - name: Frontend build
        run: npm run build

      - name: PostgreSQL migration verification
        run: |
          php artisan migrate:fresh --env=testing --force
          php artisan migrate:rollback --env=testing --step=4 --force
          php artisan migrate --env=testing --force

      - name: Subpoena PDF visual baseline
        run: |
          python -m pip install --disable-pip-version-check pymupdf==1.28.0
          M6_VISUAL_OUTPUT=storage/framework/testing/m6-current.pdf php artisan test --filter=PublicLookupAndDocumentsTest
          python tests/visual/compare_subpoena_pdf.py tests/Fixtures/M6/approved-legacy-subpoena.pdf storage/framework/testing/m6-current.pdf

      - name: Case Report PDF visual verification
        run: |
          M7_VISUAL_OUTPUT=storage/framework/testing/m7-case-report.pdf php artisan test --filter=ReportsAndAuditTest
          python tests/visual/validate_case_report_pdf.py storage/framework/testing/m7-case-report.pdf

      - name: Test
        run: php artisan test
