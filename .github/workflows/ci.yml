name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: lexverdict_test
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d lexverdict_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pgsql, pdo_pgsql
          coverage: none

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PHP dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Install frontend dependencies
        run: npm ci

      - name: Prepare environment
        run: |
          cp .env.testing.example .env.testing
          php artisan key:generate --env=testing

      - name: PHP format check
        run: composer format -- --test

      - name: Static analysis
        run: composer analyse -- --no-progress

      - name: Dependency and tracked-secret audit
        run: |
          composer audit --no-interaction
          npm audit --audit-level=high
          php ops/check-no-secrets.php

      - name: Frontend lint
        run: npm run lint

      - name: TypeScript check
        run: npm run typecheck

      - name: Frontend build
        run: npm run build

      - name: Hardened release configuration check
        env:
          APP_ENV: production
          APP_KEY: base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          APP_DEBUG: 'false'
          APP_URL: https://lexverdict.example.gov.ph
          APP_TIMEZONE: Asia/Manila
          DB_CONNECTION: pgsql
          DB_SSLMODE: require
          CACHE_STORE: database
          QUEUE_CONNECTION: database
          SESSION_ENCRYPT: 'true'
          SESSION_SECURE_COOKIE: 'true'
          SESSION_HTTP_ONLY: 'true'
          SESSION_SAME_SITE: lax
          DOCUMENT_DISK: local
        run: php artisan lexverdict:release-check

      - name: PostgreSQL migration verification
        run: |
          php artisan migrate:fresh --env=testing --force
          php artisan migrate:rollback --env=testing --step=4 --force
          php artisan migrate --env=testing --force

      - name: Queue worker smoke test
        run: php artisan queue:work database --queue=documents,default --once --stop-when-empty --timeout=120

      - name: Subpoena PDF visual baseline
        run: |
          python -m pip install --disable-pip-version-check pymupdf==1.28.0
          M6_VISUAL_OUTPUT=storage/framework/testing/m6-current.pdf php artisan test --filter=PublicLookupAndDocumentsTest
          python tests/visual/compare_subpoena_pdf.py tests/Fixtures/M6/approved-legacy-subpoena.pdf storage/framework/testing/m6-current.pdf

      - name: Case Report PDF visual verification
        run: |
          M7_VISUAL_OUTPUT=storage/framework/testing/m7-case-report.pdf php artisan test --filter=ReportsAndAuditTest
          python tests/visual/validate_case_report_pdf.py storage/framework/testing/m7-case-report.pdf

      - name: Test
        run: php artisan test

      - name: PostgreSQL backup and restore rehearsal
        shell: pwsh
        run: |
          $backup = ./ops/backup-postgresql.ps1 -OutputDirectory storage/framework/testing/backups -EnvironmentFile .env.testing | Select-Object -Last 1
          ./ops/verify-postgresql-restore.ps1 -BackupFile $backup -EnvironmentFile .env.testing -VerificationDatabase lexverdict_ci_restore_verify

      - name: Browser and accessibility verification
        run: |
          php artisan migrate:fresh --env=testing --force
          php artisan db:seed --class=Database\\Seeders\\M8E2ESeeder --env=testing --force
          npx playwright install --with-deps chromium
          npm run test:e2e
